# CI workflow: lint, format check, unit tests, build
name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      [main, feat/backend-migration-and-cypress, yakov/git-state-cleanup]
  pull_request:
    branches:
      [main, feat/backend-migration-and-cypress, yakov/git-state-cleanup]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Setup Deno (edge functions — full bundling check)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge functions bundling check (Deno)
        run: pnpm run check:edge-functions:bundling:full

      - name: OpenAPI spec drift check
        run: pnpm run openapi:edge-functions:check

      - name: Postman collection drift check
        run: pnpm run postman:collection:check

      - name: Typecheck
        run: pnpm run type:check

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: https://test.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: test-anon-key-for-ci
