# One-shot: apply labels + milestones to PR #47 delivery issues (requires issues: write).
name: Apply PR47 issue metadata

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply labels and milestones to issues #55–#58
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/apply-pr47-issue-metadata.mjs

      - name: Assign delivery issues from milestones.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/bootstrap-github-milestones.mjs
