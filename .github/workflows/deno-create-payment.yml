# Typecheck, lint, and test the create-payment edge function (no frozen lockfile:
# Supabase CLI Docker bundler uses an older Deno that cannot read Deno 2 lockfile v5).
# Branch filters: keep in sync with `.github/workflows/ci.yml`.
name: Deno create-payment

on:
  push:
    branches: [main, feat/backend-migration-and-cypress, yakov/git-state-cleanup]
  pull_request:
    branches: [main, feat/backend-migration-and-cypress, yakov/git-state-cleanup]

concurrency:
  group: deno-create-payment-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase/functions

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno check
        run: deno check create-payment/index.ts --config deno.json

      - name: Deno lint
        run: deno lint create-payment/ --config deno.json

      - name: Deno test
        run: deno test create-payment/ --config deno.json --allow-env

      - name: Deno test checkout pricing helpers
        run: |
          deno test stripe-webhook/lib/pricing-snapshot_test.ts
          deno test send-order-confirmation/_lib/email-pricing-from-db_test.ts
